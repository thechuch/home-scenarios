<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#20272a;background:#f6f8f6;}
  /* gate */
  #gate{min-height:100%;display:flex;align-items:center;justify-content:center;padding:20px;}
  .box{background:#fff;border:1px solid #dde2de;border-radius:16px;padding:30px 28px;max-width:360px;width:100%;
    text-align:center;box-shadow:0 6px 24px rgba(0,0,0,.06);}
  .lock{font-size:34px;}
  .box h1{font-size:19px;margin:10px 0 4px;}
  .box p{color:#5c6763;font-size:13.5px;margin-bottom:18px;}
  #pw{width:100%;padding:12px 14px;border:1px solid #dde2de;border-radius:10px;font-size:16px;text-align:center;letter-spacing:1px;}
  #pw:focus{outline:none;border-color:#2f5d50;}
  .box button{width:100%;margin-top:12px;padding:12px;border:none;border-radius:10px;background:#2f5d50;color:#fff;
    font-size:15px;font-weight:700;cursor:pointer;}
  .err{color:#8a3b2e;font-size:13px;margin-top:12px;min-height:18px;font-weight:600;}
  /* shell */
  #shell{display:none;flex-direction:column;height:100%;}
  #shell.on{display:flex;}
  nav{flex:0 0 auto;display:flex;align-items:center;gap:2px;padding:6px 9px;background:#fff;
    border-bottom:1px solid #edf0ed;}
  nav .mark{width:7px;height:7px;border-radius:50%;background:#c9d3cd;margin:0 8px 0 4px;flex:0 0 auto;}
  nav a{font-size:12.5px;color:#9aa39d;padding:6px 10px;border-radius:8px;cursor:pointer;user-select:none;
    letter-spacing:.2px;white-space:nowrap;}
  nav a.on{color:#2f5d50;background:#eef2ef;font-weight:600;}
  nav a:active{background:#e5ebe7;}
  .spin{margin-left:auto;width:13px;height:13px;border:2px solid #dfe6e1;border-top-color:#9aa39d;border-radius:50%;
    opacity:0;transition:opacity .15s;animation:sp .7s linear infinite;}
  .spin.go{opacity:1;}
  @keyframes sp{to{transform:rotate(360deg);}}
  iframe{flex:1 1 auto;width:100%;border:none;display:block;background:#f6f8f6;}
</style>
</head>
<body>
  <div id="gate">
    <div class="box">
      <div class="lock">🔒</div>
      <h1>Private tool</h1>
      <p>Enter the password to open.</p>
      <form id="f">
        <input id="pw" type="password" placeholder="Password" autocomplete="off" autofocus>
        <button type="submit">Unlock</button>
        <div class="err" id="err"></div>
      </form>
    </div>
  </div>

  <div id="shell">
    <nav id="nav">
      <span class="mark"></span>
      <a data-k="calc" class="on">Scenarios</a>
      <a data-k="talk">Talk</a>
      <a data-k="notes">Notes</a>
      <a data-k="letter">Letter</a>
      <span class="spin" id="spin"></span>
    </nav>
    <iframe id="frame" title="tool"></iframe>
  </div>

<script>
  const $ = s => document.querySelector(s);
  const b = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const cache = {};
  let PW = sessionStorage.getItem('hk') || null;

  async function keyFor(salt, n){
    const bk = await crypto.subtle.importKey('raw', new TextEncoder().encode(PW), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey({name:'PBKDF2', salt, iterations:n, hash:'SHA-256'},
      bk, {name:'AES-GCM', length:256}, false, ['decrypt']);
  }
  async function decryptTool(name){
    if(cache[name]) return cache[name];
    const p = await (await fetch(name + '.json', {cache:'no-store'})).json();
    const key = await keyFor(b(p.s), p.n);
    const buf = await crypto.subtle.decrypt({name:'AES-GCM', iv:b(p.i)}, key, b(p.c));
    return cache[name] = new TextDecoder().decode(buf);
  }
  async function openTool(name){
    document.querySelectorAll('nav a').forEach(a => a.classList.toggle('on', a.dataset.k === name));
    $('#spin').classList.add('go');
    try { $('#frame').srcdoc = await decryptTool(name); }
    finally { $('#spin').classList.remove('go'); }
  }
  function enterApp(){
    $('#gate').style.display = 'none';
    $('#shell').classList.add('on');
    openTool('calc');
  }
  $('#nav').addEventListener('click', e => { const a = e.target.closest('a'); if(a) openTool(a.dataset.k); });
  $('#f').addEventListener('submit', async e => {
    e.preventDefault();
    $('#err').textContent = 'Unlocking…';
    PW = $('#pw').value;
    try { await decryptTool('calc'); sessionStorage.setItem('hk', PW); enterApp(); }
    catch(_) { $('#err').textContent = 'Wrong password, try again.'; }
  });
  // stay unlocked across reloads/navigation within the same tab
  (async () => { if(PW){ try { await decryptTool('calc'); enterApp(); } catch(_) { sessionStorage.removeItem('hk'); PW = null; } } })();
</script>
</body>
</html>
